# LiteLLM proxy config — example for running the junai harness on local models.
# Fill in VLLM_BASE_URL (and ANTHROPIC_API_KEY for the hybrid profile), then:
#   pip install 'litellm[proxy]'
#   litellm --config litellm.config.example.yaml      # serves an Anthropic-compatible endpoint
# Point Claude Code at it:
#   $env:ANTHROPIC_BASE_URL = "http://localhost:4000"
#   $env:ANTHROPIC_AUTH_TOKEN = "<litellm master key>"
#   $env:CLAUDE_CODE_ENABLE_GATEWAY_MODEL_DISCOVERY = "1"   # surfaces these models in /model
# The `model_name` values below are the tier/model names Claude Code requests; the gateway routes each
# to the upstream `model:` in litellm_params (there is no model-aliases.json — LiteLLM owns the routing).
# NOTE: vLLM serves an OpenAI-compatible API; LiteLLM reaches it via the hosted_vllm/ prefix.
# Adjust the upstream `model:` strings to the exact names your vLLM deployment registers.

model_list:
  # ── Local models (served by vLLM) ──────────────────────────────────────────
  - model_name: qwen2.5-vl-32b          # opus tier (planner/verify) — strongest + vision
    litellm_params:
      model: hosted_vllm/Qwen2.5-VL-32B-Instruct
      api_base: os.environ/VLLM_BASE_URL

  - model_name: qwen2.5-coder-14b       # sonnet tier (coder/reviewer) — dedicated coder
    litellm_params:
      model: hosted_vllm/Qwen2.5-Coder-14B-Instruct
      api_base: os.environ/VLLM_BASE_URL

  - model_name: deepseek-coder-v2-lite  # alternate coder (fast MoE)
    litellm_params:
      model: hosted_vllm/DeepSeek-Coder-V2-Lite-Instruct
      api_base: os.environ/VLLM_BASE_URL

  - model_name: mistral-7b              # haiku tier (bulk/fast)
    litellm_params:
      model: hosted_vllm/Mistral-7B-Instruct-v0.3
      api_base: os.environ/VLLM_BASE_URL

  - model_name: gemma-4-12b-qat         # alternate mid general (efficient quant)
    litellm_params:
      model: hosted_vllm/Gemma-4-12B-QAT
      api_base: os.environ/VLLM_BASE_URL

  - model_name: gemma-4-e4b             # alternate tiny (classification/bulk)
    litellm_params:
      model: hosted_vllm/Gemma-4-E4B
      api_base: os.environ/VLLM_BASE_URL

  - model_name: nomic-embed             # EMBEDDINGS only (RAG/retrieval), not a chat tier
    litellm_params:
      model: hosted_vllm/nomic-embed-text-v1.5
      api_base: os.environ/VLLM_BASE_URL

  # ── Anthropic passthrough (for the `hybrid` profile: Opus plans, local codes) ─
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  drop_params: true          # tolerate provider-specific params local models don't accept
  # Claude Code attaches anthropic-beta headers; some local backends 400 on them.
  # If you hit "invalid beta flag", strip them at the proxy (see LOCAL-MODELS.md §Troubleshooting).
