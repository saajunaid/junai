  <!-- ────────────────────────────────────────────────────────── -->
  <!-- SYNC COMMAND CARDS (y=635, h=100)                          -->
  <!-- 4 cards: w=375 each, gap=20, x: 20 | 415 | 810 | 1205     -->
  <!-- ────────────────────────────────────────────────────────── -->

  <!-- juno-pull -->
  <rect x="20" y="635" width="375" height="100" rx="10" fill="white" filter="url(#shadow-sm)"/>
  <path d="M 30,635 h 355 q 10,0 10,10 v 24 h -375 v -24 q 0,-10 10,-10 z" fill="#dbeafe"/>
  <text x="34" y="654" font-size="12" font-weight="700" fill="#1e40af">juno-pull</text>
  <text x="371" y="654" text-anchor="end" font-size="10" fill="#3b82f6">GitHub → Project</text>
  <text x="34" y="676" font-size="11" fill="#1e293b" font-weight="500">Copy juno-ai pool into current project's .github/</text>
  <text x="34" y="693" font-size="10.5" fill="#64748b">Overwrites agents, skills, prompts, instructions, diagrams</text>
  <text x="34" y="712" font-size="10" fill="#dc2626">Requires: GitHub access · git push to remote</text>
  <text x="34" y="727" font-size="10" fill="#6b7280">Usage:  juno-pull</text>

  <!-- juno-push -->
  <rect x="415" y="635" width="375" height="100" rx="10" fill="white" filter="url(#shadow-sm)"/>
  <path d="M 425,635 h 355 q 10,0 10,10 v 24 h -375 v -24 q 0,-10 10,-10 z" fill="#dcfce7"/>
  <text x="429" y="654" font-size="12" font-weight="700" fill="#14532d">juno-push</text>
  <text x="766" y="654" text-anchor="end" font-size="10" fill="#16a34a">Project → GitHub</text>
  <text x="429" y="676" font-size="11" fill="#1e293b" font-weight="500">Sync project pool changes back to juno-ai + commit</text>
  <text x="429" y="693" font-size="10.5" fill="#64748b">Stages all pool folder changes, commits, pushes to juno-ai</text>
  <text x="429" y="712" font-size="10" fill="#dc2626">Requires: GitHub access · write perms on juno-ai</text>
  <text x="429" y="727" font-size="10" fill="#6b7280">Usage:  juno-push [-Message "…"]</text>

  <!-- juno-export -->
  <rect x="810" y="635" width="375" height="100" rx="10" fill="white" filter="url(#shadow-sm)"/>
  <path d="M 820,635 h 355 q 10,0 10,10 v 24 h -375 v -24 q 0,-10 10,-10 z" fill="#fef3c7"/>
  <text x="824" y="654" font-size="12" font-weight="700" fill="#78350f">juno-export</text>
  <text x="1161" y="654" text-anchor="end" font-size="10" fill="#d97706">Pool → Local disk</text>
  <text x="824" y="676" font-size="11" fill="#1e293b" font-weight="500">Bundle pool folders to a local folder or .zip file</text>
  <text x="824" y="693" font-size="10.5" fill="#64748b">Includes sync.ps1 itself · no GitHub needed · offline-safe</text>
  <text x="824" y="712" font-size="10" fill="#059669">No GitHub required · works air-gapped / offline</text>
  <text x="824" y="727" font-size="10" fill="#6b7280">Usage:  juno-export [-OutputPath path] [-Zip]</text>

  <!-- juno-import -->
  <rect x="1205" y="635" width="375" height="100" rx="10" fill="white" filter="url(#shadow-sm)"/>
  <path d="M 1215,635 h 355 q 10,0 10,10 v 24 h -375 v -24 q 0,-10 10,-10 z" fill="#ede9fe"/>
  <text x="1219" y="654" font-size="12" font-weight="700" fill="#4c1d95">juno-import</text>
  <text x="1556" y="654" text-anchor="end" font-size="10" fill="#7c3aed">Local disk → Project</text>
  <text x="1219" y="676" font-size="11" fill="#1e293b" font-weight="500">Import pool from a folder or .zip into project .github/</text>
  <text x="1219" y="693" font-size="10.5" fill="#64748b">Accepts .zip (auto-extracts) · skips project-config.md</text>
  <text x="1219" y="712" font-size="10" fill="#059669">No GitHub required · works air-gapped / offline</text>
  <text x="1219" y="727" font-size="10" fill="#6b7280">Usage:  juno-import &lt;SourcePath&gt;</text>

