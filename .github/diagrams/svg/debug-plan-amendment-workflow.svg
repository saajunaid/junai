<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
    <marker id="arrow-plum" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A2D82"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97706"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="codexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="opusGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="planGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A2D82"/>
      <stop offset="100%" stop-color="#3B022A"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" rx="16" fill="#F8FAFC"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1100" height="72" rx="16" fill="url(#headerGrad)"/>
  <rect x="0" y="40" width="1100" height="32" fill="url(#headerGrad)"/>
  <text x="550" y="32" text-anchor="middle" fill="white" font-size="24" font-weight="800" letter-spacing="1">IMPLEMENTATION BUG → PLAN AMENDMENT WORKFLOW</text>
  <text x="550" y="56" text-anchor="middle" fill="#94A3B8" font-size="13" font-weight="600">Pattern G — Debug Agent writes brief, Plan Agent applies change</text>

  <!-- ===== MAIN FLOW (3 boxes) ===== -->

  <!-- Box 1: Implementation Agent -->
  <rect x="40" y="110" width="300" height="210" rx="14" fill="white" stroke="#059669" stroke-width="3" filter="url(#shadow)"/>
  <rect x="40" y="110" width="300" height="50" rx="14" fill="url(#codexGrad)"/>
  <rect x="40" y="146" width="300" height="14" fill="url(#codexGrad)"/>
  <text x="190" y="143" text-anchor="middle" fill="white" font-size="17" font-weight="800">IMPLEMENTATION</text>
  <text x="60" y="190" fill="#4A4A4A" font-size="13" font-weight="700">Agents:</text>
  <text x="130" y="190" fill="#059669" font-size="13" font-weight="700">GPT-5.3-Codex</text>
  <text x="60" y="215" fill="#4A4A4A" font-size="12" font-weight="600">• Implement</text>
  <text x="60" y="235" fill="#4A4A4A" font-size="12" font-weight="600">• Streamlit Developer</text>
  <text x="60" y="255" fill="#4A4A4A" font-size="12" font-weight="600">• Data Engineer</text>
  <text x="60" y="275" fill="#4A4A4A" font-size="12" font-weight="600">• SQL Expert</text>
  <text x="60" y="295" fill="#4A4A4A" font-size="12" font-weight="600">• Frontend Developer</text>

  <!-- Handoff button 1 (below Implementation box) -->
  <rect x="115" y="330" width="150" height="34" rx="17" fill="#DC2626" filter="url(#shadow)"/>
  <text x="190" y="352" text-anchor="middle" fill="white" font-size="12" font-weight="800">"Debug Issue"</text>

  <!-- Arrow 1: Implementation → Debug (solid, horizontal) -->
  <path d="M340,215 L408,215" stroke="#4A4A4A" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="370" y="205" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="800">handoff</text>

  <!-- Box 2: Debug Agent -->
  <rect x="410" y="110" width="300" height="360" rx="14" fill="white" stroke="#1E40AF" stroke-width="3" filter="url(#shadow)"/>
  <rect x="410" y="110" width="300" height="50" rx="14" fill="url(#opusGrad)"/>
  <rect x="410" y="146" width="300" height="14" fill="url(#opusGrad)"/>
  <text x="560" y="143" text-anchor="middle" fill="white" font-size="17" font-weight="800">DEBUG AGENT</text>
  <text x="430" y="190" fill="#4A4A4A" font-size="13" font-weight="700">Model:</text>
  <text x="485" y="190" fill="#1E40AF" font-size="13" font-weight="700">Claude Opus 4.6</text>

  <!-- Debug steps 1-3 -->
  <rect x="430" y="210" width="260" height="30" rx="6" fill="#EFF6FF"/>
  <text x="440" y="230" fill="#1E3A8A" font-size="12" font-weight="700">1. Diagnose root cause</text>
  <rect x="430" y="248" width="260" height="30" rx="6" fill="#EFF6FF"/>
  <text x="440" y="268" fill="#1E3A8A" font-size="12" font-weight="700">2. Fix the code</text>
  <rect x="430" y="286" width="260" height="30" rx="6" fill="#EFF6FF"/>
  <text x="440" y="306" fill="#1E3A8A" font-size="12" font-weight="700">3. Run tests</text>

  <!-- Decision diamond -->
  <polygon points="560,336 636,370 560,404 484,370" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="560" y="367" text-anchor="middle" fill="#92400E" font-size="11" font-weight="800">Plan also</text>
  <text x="560" y="381" text-anchor="middle" fill="#92400E" font-size="11" font-weight="800">wrong?</text>

  <!-- NO path: diamond left → Done badge (badge first for z-order) -->
  <rect x="330" y="356" width="84" height="28" rx="14" fill="#22C55E"/>
  <text x="372" y="375" text-anchor="middle" fill="white" font-size="12" font-weight="800">Done</text>
  <path d="M484,370 L414,370" stroke="#22C55E" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="452" y="360" fill="#22C55E" font-size="10" font-weight="800">NO</text>

  <!-- YES path: diamond bottom → step 4 (with arrowhead) -->
  <path d="M560,404 L560,422" stroke="#DC2626" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="575" y="417" fill="#DC2626" font-size="10" font-weight="800">YES</text>

  <!-- Step 4: Write amendment brief -->
  <rect x="430" y="424" width="260" height="30" rx="6" fill="#FEF2F2"/>
  <text x="440" y="444" fill="#991B1B" font-size="12" font-weight="700">4. Write amendment brief</text>

  <!-- Handoff button 2: Amend Plan -->
  <rect x="485" y="462" width="150" height="32" rx="16" fill="#5A2D82" filter="url(#shadow)"/>
  <text x="560" y="482" text-anchor="middle" fill="white" font-size="12" font-weight="800">"Amend Plan"</text>

  <!-- Arrow 2: Amend Plan → Plan Agent (cubic bezier, arrives horizontally) -->
  <path d="M635,478 C720,478 740,300 780,300" fill="none" stroke="#5A2D82" stroke-width="3" marker-end="url(#arrow-plum)"/>
  <text x="690" y="440" fill="#5A2D82" font-size="11" font-weight="800">handoff</text>

  <!-- Box 3: Plan Agent -->
  <rect x="780" y="110" width="280" height="260" rx="14" fill="white" stroke="#5A2D82" stroke-width="3" filter="url(#shadow)"/>
  <rect x="780" y="110" width="280" height="50" rx="14" fill="url(#planGrad)"/>
  <rect x="780" y="146" width="280" height="14" fill="url(#planGrad)"/>
  <text x="920" y="143" text-anchor="middle" fill="white" font-size="17" font-weight="800">PLAN AGENT</text>
  <text x="800" y="190" fill="#4A4A4A" font-size="13" font-weight="700">Model:</text>
  <text x="855" y="190" fill="#5A2D82" font-size="13" font-weight="700">Claude Opus 4.6</text>

  <!-- Plan steps -->
  <rect x="800" y="210" width="240" height="28" rx="6" fill="#F5F3FF"/>
  <text x="810" y="229" fill="#3B022A" font-size="12" font-weight="700">1. Read amendment brief</text>
  <rect x="800" y="246" width="240" height="28" rx="6" fill="#F5F3FF"/>
  <text x="810" y="265" fill="#3B022A" font-size="12" font-weight="700">2. Find plan section</text>
  <rect x="800" y="282" width="240" height="28" rx="6" fill="#F5F3FF"/>
  <text x="810" y="301" fill="#3B022A" font-size="12" font-weight="700">3. Apply the change</text>
  <rect x="800" y="318" width="240" height="28" rx="6" fill="#F5F3FF"/>
  <text x="810" y="337" fill="#3B022A" font-size="12" font-weight="700">4. Mark brief as APPLIED</text>

  <!-- Done checkmark for Plan -->
  <rect x="875" y="356" width="90" height="28" rx="14" fill="#22C55E"/>
  <text x="920" y="375" text-anchor="middle" fill="white" font-size="12" font-weight="800">Done</text>

  <!-- ===== AMENDMENT BRIEF FILE ===== -->
  <rect x="370" y="510" width="360" height="200" rx="12" fill="white" stroke="#D97706" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="370" y="510" width="360" height="40" rx="12" fill="url(#fileGrad)"/>
  <rect x="370" y="537" width="360" height="13" fill="url(#fileGrad)"/>
  <text x="550" y="537" text-anchor="middle" fill="white" font-size="14" font-weight="800">.github/handoffs/plan-amendment-*.md</text>

  <text x="390" y="575" fill="#4A4A4A" font-size="12" font-weight="700">Plan file:</text>
  <text x="470" y="575" fill="#78716C" font-size="11">.github/plans/search_upgrade_*.md</text>
  <text x="390" y="598" fill="#4A4A4A" font-size="12" font-weight="700">Section:</text>
  <text x="460" y="598" fill="#78716C" font-size="11">Phase 6B — Step 1, "File 1"</text>
  <text x="390" y="621" fill="#4A4A4A" font-size="12" font-weight="700">Issue found:</text>
  <text x="485" y="621" fill="#78716C" font-size="11">Taxonomy mismatch...</text>
  <text x="390" y="644" fill="#4A4A4A" font-size="12" font-weight="700">Fix applied:</text>
  <text x="475" y="644" fill="#78716C" font-size="11">Added bridge mapping</text>
  <text x="390" y="667" fill="#4A4A4A" font-size="12" font-weight="700">Plan change:</text>
  <text x="485" y="667" fill="#78716C" font-size="11">Add bridge function calls</text>
  <text x="390" y="690" fill="#4A4A4A" font-size="12" font-weight="700">Affected prompts:</text>
  <text x="520" y="690" fill="#78716C" font-size="11">Step 1 prompt block</text>

  <!-- Arrow: Step 4 writes → amendment file (dashed amber, vertical) -->
  <path d="M560,494 L560,508" stroke="#D97706" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrow-amber)"/>
  <text x="575" y="504" fill="#D97706" font-size="10" font-weight="700">writes</text>

  <!-- Arrow: amendment file → Plan reads (cubic bezier, arrives horizontally at step 1) -->
  <path d="M730,590 C770,590 720,224 780,224" fill="none" stroke="#5A2D82" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrow-plum)"/>
  <text x="750" y="455" fill="#5A2D82" font-size="10" font-weight="700">reads</text>

  <!-- ===== DECISION TREE (bottom) ===== -->
  <rect x="40" y="730" width="1020" height="70" rx="12" fill="#0F172A" filter="url(#shadow)"/>
  <text x="60" y="758" fill="#F59E0B" font-size="14" font-weight="800">DECISION TREE:</text>
  <text x="220" y="758" fill="white" font-size="13" font-weight="600">Code-only bug? →</text>
  <text x="375" y="758" fill="#22C55E" font-size="13" font-weight="800">Debug fixes code, done</text>
  <text x="555" y="758" fill="#475569" font-size="13">│</text>
  <text x="580" y="758" fill="white" font-size="13" font-weight="600">Plan also wrong? →</text>
  <text x="755" y="758" fill="#F59E0B" font-size="13" font-weight="800">Debug writes brief → Plan applies</text>
  <text x="60" y="783" fill="#F59E0B" font-size="14" font-weight="800">KEY RULE:</text>
  <text x="155" y="783" fill="#F87171" font-size="13" font-weight="800">Debug NEVER edits plan files directly.</text>
  <text x="460" y="783" fill="#CBD5E1" font-size="13">Small file (&lt;20 lines) bridges the gap between agents.</text>

  <!-- Model legend -->
  <rect x="780" y="510" width="270" height="140" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="800" y="535" fill="#0F172A" font-size="13" font-weight="800">MODEL LEGEND</text>
  <rect x="800" y="548" width="14" height="14" rx="3" fill="#059669"/>
  <text x="822" y="560" fill="#374151" font-size="12" font-weight="700">GPT-5.3-Codex</text>
  <text x="930" y="560" fill="#64748B" font-size="11">Multi-file coding</text>
  <rect x="800" y="572" width="14" height="14" rx="3" fill="#1E40AF"/>
  <text x="822" y="584" fill="#374151" font-size="12" font-weight="700">Opus 4.6</text>
  <text x="910" y="584" fill="#64748B" font-size="11">Deep reasoning</text>
  <rect x="800" y="596" width="14" height="14" rx="3" fill="#5A2D82"/>
  <text x="822" y="608" fill="#374151" font-size="12" font-weight="700">Opus 4.6</text>
  <text x="910" y="608" fill="#64748B" font-size="11">Strategic planning</text>
  <rect x="800" y="620" width="14" height="14" rx="3" fill="#D97706"/>
  <text x="822" y="632" fill="#374151" font-size="12" font-weight="700">Amendment Brief</text>
  <text x="940" y="632" fill="#64748B" font-size="11">&lt;20 lines</text>

  <!-- Handoff buttons legend -->
  <rect x="40" y="510" width="310" height="150" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="535" fill="#0F172A" font-size="13" font-weight="800">HANDOFF BUTTONS (same chat)</text>
  <rect x="60" y="548" width="130" height="26" rx="13" fill="#DC2626"/>
  <text x="125" y="566" text-anchor="middle" fill="white" font-size="11" font-weight="800">"Debug Issue"</text>
  <text x="200" y="566" fill="#64748B" font-size="11">on all Codex agents</text>
  <rect x="60" y="582" width="130" height="26" rx="13" fill="#5A2D82"/>
  <text x="125" y="600" text-anchor="middle" fill="white" font-size="11" font-weight="800">"Amend Plan"</text>
  <text x="200" y="600" fill="#64748B" font-size="11">on Debug agent</text>
  <rect x="60" y="616" width="130" height="26" rx="13" fill="#1E40AF"/>
  <text x="125" y="634" text-anchor="middle" fill="white" font-size="11" font-weight="800">"Run Tests"</text>
  <text x="200" y="634" fill="#64748B" font-size="11">on Debug agent</text>
</svg>
